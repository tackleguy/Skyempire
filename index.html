<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SkyEmpire</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app" class="hidden">
  <aside id="sidebar">
    <div class="side-head">
      <div id="sideLogo" class="logo-mini"></div>
      <span id="sideName" class="side-name">SkyEmpire</span>
      <button id="collapseBtn" class="chevron" title="Collapse">‹</button>
    </div>
    <nav id="nav"></nav>
  </aside>
  <div id="main">
    <header id="topbar">
      <div class="tb-left">
        <div id="tbLogo" class="logo-mini"></div>
        <span id="tbAirline" class="tb-name"></span>
        <span id="tbCash" class="tb-cash">$0</span>
        <span id="tbPnl" class="chip"></span>
        <span id="tbFuel" class="chip" title="Fuel index"></span>
        <span id="tbImg" class="chip" title="Airline image — grows with well-rated flights"></span>
      </div>
      <div class="tb-right">
        <span id="tbClock" class="tb-clock"></span>
        <div id="speedCtl" class="seg">
          <button data-speed="0">⏸</button>
          <button data-speed="1" class="active">1×</button>
          <button data-speed="5">5×</button>
          <button data-speed="20">20×</button>
        </div>
        <button id="saveBtn" class="icon-btn" title="Save">💾</button>
      </div>
    </header>
    <div id="banner" class="banner hidden"></div>
    <main id="content">
      <div id="screen-map" class="screen active"><div id="map"></div><input id="mapSearch" placeholder="Search airport (IATA or city)…" autocomplete="off"><div id="spotlight" class="spotlight hidden"></div></div>
      <div id="screen-fleet" class="screen pad"></div>
      <div id="screen-routes" class="screen pad"></div>
      <div id="screen-airports" class="screen pad"></div>
      <div id="screen-finances" class="screen pad"></div>
      <div id="screen-livery" class="screen pad"></div>
      <div id="screen-achievements" class="screen pad"></div>
    </main>
  </div>
</div>
<div id="wizard" class="wizard hidden"></div>
<div id="modalBackdrop" class="backdrop hidden"><div id="modal" class="modal"></div></div>
<div id="toasts"></div>
<canvas id="confetti"></canvas>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="arc.js"></script>
<script src="data.js"></script>
<script src="game.js"></script>
</body>
</html>
